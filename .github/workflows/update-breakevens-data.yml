name: Update Breakevens Data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC: Tuesday at 8:17 am in Brisbane.
    - cron: "17 22 * * 1"

permissions:
  contents: write

concurrency:
  group: update-breakevens-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Generate public breakevens data
        env:
          BREAKEVENS_DATA_OUTPUT: public/api/breakevens-data.json
        run: |
          for attempt in 1 2 3 4; do
            if node scripts/generate-breakevens-data.mjs; then
              exit 0
            fi

            if [ "$attempt" -eq 4 ]; then
              echo "Data generation failed after ${attempt} attempts."
              exit 1
            fi

            wait_seconds=$((attempt * 30))
            echo "Data source request failed; retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
          done
      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain public/api/breakevens-data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/api/breakevens-data.json
            git commit -m "Update breakevens data"
            git push
          else
            echo "Breakevens data is already current."
          fi
